<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Somesh Admin</title>
  <meta name="description" content="Admin dashboard for Somesh's personal blog.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="bg-orb orb-one"></div>
  <div class="bg-orb orb-two"></div>
  <header class="site-header">
    <div class="brand-wrap">
      <div class="brand">SB</div>
      <div>
        <p class="brand-kicker">Admin Access</p>
        <h1 class="brand-title">Somesh Review Control</h1>
      </div>
    </div>
    <nav class="nav">
      <a href="./index.html">Back to Site</a>
    </nav>
  </header>

  <main>
    <section class="section admin-shell reveal visible">
      <div class="admin-panel card">
        <p class="eyebrow">Admin Setup</p>
        <h2 id="admin-heading">Create your admin account</h2>
        <p id="admin-description" class="hero-text">Sign up once to manage reviews, delete spam, and reply to visitors.</p>

        <form id="signup-form" class="review-form">
          <label>
            Username
            <input type="text" name="username" maxlength="32" placeholder="Choose an admin name" required>
          </label>
          <label>
            Password
            <input type="password" name="password" minlength="6" placeholder="At least 6 characters" required>
          </label>
          <button class="button primary" type="submit">Sign Up</button>
        </form>

        <form id="login-form" class="review-form hidden-block">
          <label>
            Username
            <input type="text" name="username" maxlength="32" placeholder="Enter your admin name" required>
          </label>
          <label>
            Password
            <input type="password" name="password" minlength="6" placeholder="Enter password" required>
          </label>
          <button class="button primary" type="submit">Log In</button>
        </form>

        <div id="admin-actions" class="hidden-block">
          <div class="admin-topbar">
            <p id="admin-welcome" class="mini-label"></p>
            <button id="logout-button" class="button secondary" type="button">Log Out</button>
          </div>
          <p class="hero-text">You can reply to reviews or remove them from here.</p>
        </div>

        <p id="admin-status" class="form-status" aria-live="polite"></p>
      </div>

      <div class="card">
        <p class="eyebrow">Review Manager</p>
        <h2>Manage community feedback</h2>
        <div id="admin-review-list" class="review-list"></div>
      </div>
    </section>
  </main>

  <script src="./admin.js"></script>
  <script src="./ui-effects.js"></script>
</body>
</html>
